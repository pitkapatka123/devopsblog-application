{% extends "base.html" %}
{% block content %}
<section class="posts-list">
  <h2>Posts</h2>
  <ul>
    {% for post in posts %}
      <li>
        <a href="{{ url_for('post_detail', slug=post.slug) }}">
          <span class="post-title">{{ post.meta.title }}</span>
          <span class="post-meta">{{ post.meta.date }}</span>
          <span class="arrow">&rarr;</span>
        </a>
      </li>
    {% endfor %}
  </ul>
</section>
{% endblock %}
