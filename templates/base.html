<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>{{ title if title is defined else "DevOps Blog" }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header>
    <h1><a href="{{ url_for('index') }}">DevOps Blog</a></h1>
    <nav>
      <a href="{{ url_for('list_posts') }}">Home</a> |
      <a href="{{ url_for('about_page') }}">About</a> |
      <a href="{{ url_for('contact_page') }}">Contact</a>
    </nav>
    <hr/>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer>
    <hr/>
    <p>&copy; January 2026 DevOps Blog. All rights reserved.</p>
  </footer>
</body>
</html>
