<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title if title is defined else "DevOps Blog" }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <!-- ── Waterfall Background ── -->
  <div class="waterfall" aria-hidden="true">
    <img class="drop d1" src="{{ url_for('static', filename='icons/docker.svg') }}" alt="">
    <img class="drop d2" src="{{ url_for('static', filename='icons/kubernetes.svg') }}" alt="">
    <img class="drop d3" src="{{ url_for('static', filename='icons/terraform.svg') }}" alt="">
    <img class="drop d4" src="{{ url_for('static', filename='icons/git.svg') }}" alt="">
    <img class="drop d5" src="{{ url_for('static', filename='icons/argocd.svg') }}" alt="">
    <img class="drop d6" src="{{ url_for('static', filename='icons/helm.svg') }}" alt="">
    <img class="drop d7" src="{{ url_for('static', filename='icons/linux.svg') }}" alt="">
    <img class="drop d8" src="{{ url_for('static', filename='icons/ubuntu.svg') }}" alt="">
    <img class="drop d9" src="{{ url_for('static', filename='icons/redhat.svg') }}" alt="">
    <img class="drop d10" src="{{ url_for('static', filename='icons/grafana.svg') }}" alt="">
    <img class="drop d11" src="{{ url_for('static', filename='icons/prometheus.svg') }}" alt="">
    <img class="drop d12" src="{{ url_for('static', filename='icons/jenkins.svg') }}" alt="">
    <img class="drop d13" src="{{ url_for('static', filename='icons/ansible.svg') }}" alt="">
    <img class="drop d14" src="{{ url_for('static', filename='icons/python.svg') }}" alt="">
    <img class="drop d15" src="{{ url_for('static', filename='icons/bash.svg') }}" alt="">
    <img class="drop d16" src="{{ url_for('static', filename='icons/github.svg') }}" alt="">
    <img class="drop d17" src="{{ url_for('static', filename='icons/githubactions.svg') }}" alt="">
    <img class="drop d18" src="{{ url_for('static', filename='icons/nginx.svg') }}" alt="">
    <img class="drop d19" src="{{ url_for('static', filename='icons/aws.svg') }}" alt="">
    <img class="drop d20" src="{{ url_for('static', filename='icons/azure.svg') }}" alt="">
    <img class="drop d21" src="{{ url_for('static', filename='icons/flask.svg') }}" alt="">
    <img class="drop d22" src="{{ url_for('static', filename='icons/googlecloud.svg') }}" alt="">
    <img class="drop d23" src="{{ url_for('static', filename='icons/datadog.svg') }}" alt="">
    <img class="drop d24" src="{{ url_for('static', filename='icons/splunk.svg') }}" alt="">
    <img class="drop d25" src="{{ url_for('static', filename='icons/anthropic.svg') }}" alt="">
    <img class="drop d26" src="{{ url_for('static', filename='icons/gitlab.svg') }}" alt="">
    <img class="drop d27" src="{{ url_for('static', filename='icons/vault.svg') }}" alt="">
    <img class="drop d28" src="{{ url_for('static', filename='icons/networking.svg') }}" alt="">
    <img class="drop d29" src="{{ url_for('static', filename='icons/packer.svg') }}" alt="">
    <img class="drop d30" src="{{ url_for('static', filename='icons/snyk.svg') }}" alt="">
    <img class="drop d31" src="{{ url_for('static', filename='icons/bitbucket.svg') }}" alt="">
    <img class="drop d32" src="{{ url_for('static', filename='icons/sdlc.svg') }}" alt="">
  </div>

  <div class="container">
    <header>
      <div class="header-row">
        <a class="site-title" href="{{ url_for('index') }}">devops blog</a>
        <nav>
          <a href="{{ url_for('list_posts') }}">posts</a>
          <a href="{{ url_for('about_page') }}">about</a>
          <a href="{{ url_for('contact_page') }}">contact</a>
        </nav>
      </div>
    </header>

    <main>
      {% block content %}{% endblock %}
    </main>

    <footer>
      <p>&copy; 2026 DevOps Blog</p>
    </footer>
  </div>
</body>
</html>
