<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title if title is defined else "DevOps Blog" }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-row">
        <a class="site-title" href="{{ url_for('index') }}">devops blog</a>
        <nav>
          <a href="{{ url_for('list_posts') }}">posts</a>
          <a href="{{ url_for('about_page') }}">about</a>
          <a href="{{ url_for('contact_page') }}">contact</a>
        </nav>
      </div>
    </header>

    <main>
      {% block content %}{% endblock %}
    </main>

    <footer>
      <p>&copy; 2026 DevOps Blog</p>
    </footer>
  </div>
</body>
</html>
