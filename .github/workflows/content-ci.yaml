name: content_ci

on:
  push:
    paths:
      - 'content/**'
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
    upload-content:
      name: Upload blog content to S3
      runs-on: ubuntu-latest
      env:
        AWS_REGION: eu-central-1
        AWS_ACCOUNT_ID: "648835056994"
        ECR_REPO: "devops-blog"

      steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: get AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          
      - name: Get github secret from
        uses: aws-actions/aws-secretsmanager-get-secrets@v2
        with:
          secret-ids: |
            ghapp, github/devopsblog/github-app
          name-transformation: lowercase
          parse-json-secrets: true

      - name: create GitHubApp token
        id: apptoken
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ env.ghapp_app_id }}
          private-key: ${{ env.ghapp_private_key_pem }}
          owner: valentindodovu51
          repositories: devopsblog-gitops

      - name: Upload content to S3 (dev)
        run: |
          aws s3 sync content/ s3://${{ vars.CONTENT_BUCKET }}/dev/ --delete

      - name: Trigger GitOps content validation
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.apptoken.outputs.token }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: "valentindodovu51",
              repo: "devopsblog-gitops",
              workflow_id: "content_validation.yaml",
              ref: "master",
            });


